<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0EA5E9" />
  <title>UnicOs — Offline</title>
  <style>
    :root{color-scheme:light;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial;background:#F8FAFC;color:#0f172a}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:520px;width:100%;background:#fff;border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 18px 60px rgba(2,6,23,.08),0 2px 10px rgba(2,6,23,.06);padding:28px}
    .row{display:flex;gap:14px;align-items:center}
    .logo{width:56px;height:56px;border-radius:18px;border:1px solid #e2e8f0;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .logo img{width:100%;height:100%;object-fit:contain;padding:10px}
    h1{margin:0;font-size:18px;letter-spacing:-.02em}
    p{margin:10px 0 0;color:#475569;font-weight:600;line-height:1.5}
    .btn{margin-top:18px;width:100%;border:none;border-radius:16px;padding:14px 16px;font-weight:900;color:#fff;background:linear-gradient(135deg,#0EA5E9,#14B8A6);cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row">
        <div class="logo">
          <img src="/icon-512.png" alt="UnicOs" />
        </div>
        <div>
          <h1>Sin conexión</h1>
          <p>UnicOs necesita internet para cargar datos (Supabase/Stripe/Envía). Revisa tu conexión y reintenta.</p>
        </div>
      </div>
      <button class="btn" onclick="location.reload()">Reintentar</button>
    </div>
  </div>
</body>
</html>
