# netlify.toml para ÚNICO OS (Next.js 14 App Router)

[build]
  command = "npm run build"
  # ELIMINADO: publish = ".next". Netlify ahora auto-resuelve los estáticos y las Serverless Functions.

[build.environment]
  # Next.js 14 requiere una versión reciente de Node. 20 es el estándar más seguro y rápido actual.
  NODE_VERSION = "20"
  # Optimización estricta para que Netlify compile las rutas de la API de Next.js correctamente
  NEXT_PRIVATE_STANDALONE = "true"

# ELIMINADO: El bloque [[plugins]] con @netlify/plugin-nextjs. 
# Netlify Runtime V5 ya viene integrado por defecto y ese plugin viejo causa conflictos de ruteo.